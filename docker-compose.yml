services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPS: "false"
    container_name: citybuybd-app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DEBUGBAR_ENABLED: "false"
      APP_URL: http://localhost:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_CONNECTION: mysql
      DB_DATABASE: citybuybd
      DB_USERNAME: citybuybd
      DB_PASSWORD: strong_password_here
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RUN_MIGRATIONS: "false"
    depends_on:
      - mysql
      - redis
    volumes:
      - app_storage:/var/www/html/storage
      - app_backend:/var/www/html/backend

  mysql:
    image: mysql:8.0
    container_name: citybuybd-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: citybuybd
      MYSQL_USER: citybuybd
      MYSQL_PASSWORD: strong_password_here
      MYSQL_ROOT_PASSWORD: root_password_here
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"

  redis:
    image: redis:7-alpine
    container_name: citybuybd-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  app_storage:
  app_backend:
  mysql_data:
  redis_data:
