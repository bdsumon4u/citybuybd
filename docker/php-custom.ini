memory_limit = 1G
max_execution_time = 600
max_input_time = 600
post_max_size = 128M
upload_max_filesize = 128M

; OPcache (extension is enabled in the image; tune here for production)
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; In containers, new deploy = new filesystem: skip stat() on every request
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.max_wasted_percentage = 10
; PHP 8+ JIT (disable with opcache.jit=disable if you ever see odd behaviour)
opcache.jit = tracing
opcache.jit_buffer_size = 64M
